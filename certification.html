<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSWA Certification | Logan Thomas</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #e9ecef; /* A soft grey background makes the white certificate pop */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Forces the body to be exactly the height of the screen */
            font-family: Arial, sans-serif;
        }

        .cert-wrapper {
            text-align: center;
            padding: 20px;
        }

        .cert-wrapper img {
            max-width: 90vw;  /* Prevents it from being wider than the screen */
            max-height: 85vh; /* Prevents it from being taller than the screen */
            object-fit: contain;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); /* Gives it a professional floating drop-shadow */
            border: 1px solid #ccc;
            background-color: white; 
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background-color 0.2s ease;
        }

        .back-btn:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <div class="cert-wrapper">
        <img src="CSWA Certification Screenshot.png" alt="Certified SolidWorks Associate (CSWA) Certificate">
        <br>
        <a href="index.html" class="back-btn">Back to Portfolio</a>
    </div>

</body>
</html>
